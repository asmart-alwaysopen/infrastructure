domain: bealwaysopen.com

services:
  api:
    host: api-service
    port: 3000
  webapp:
    host: always-open-webapp
    port: 80
  website:
    host: always-open-webapp
    port: 80

mtls:
  enabled: true

# List internal services that should use ISTIO_MUTUAL when called within the mesh
internalServices:
  api-service:
    host: api-service
  call-manager:
    host: call-manager
  chat-manager:
    host: chat-manager
  knowledge-manager:
    host: knowledge-manager
  billing-service:
    host: billing-service
  analysis-service:
    host: analysis-service
  token-manager:
    host: token-manager
  webhook-manager:
    host: webhook-manager
  agent-manager:
    host: agent-manager

authz:
  enabled: true
  onlyAuthenticated: true
  # Allow calls from agent-manager service accounts that live in tenant namespaces
  allowAgentManagerFromAnyNamespace: true
  agentManagerServiceAccountName: default
  # Pattern for tenant namespaces (used in principal match); set to "*" to allow from any namespace
  tenantNamespacePattern: "tenant-*"
  # Optionally list explicit tenant namespaces to allow (in addition to the pattern)
  tenantNamespaces: []

kyverno:
  enableTenantNamespaceInjection: false
  # If using Istio revisioned control plane, set useIstioRevisionLabel true and provide revision
  useIstioRevisionLabel: false
  istioRevision: default
