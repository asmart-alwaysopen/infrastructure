{{- if .Values.authz.enabled }}
# Allow in-mesh calls from our app namespace and the ingress gateway namespace, only when authenticated
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-same-namespace-mtls
  namespace: always-open
spec:
  action: ALLOW
  rules:
  - from:
    - source:
        namespaces: ["always-open", "istio-system"]
{{- if .Values.authz.onlyAuthenticated }}
        principals: ["*"]
{{- end }}
---
{{- if and .Values.authz.enabled .Values.authz.allowAgentManagerFromAnyNamespace }}
# Allow any service account named agent-manager in tenant namespaces to call services in always-open
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-agent-manager-from-any-namespace
  namespace: always-open
spec:
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/{{ .Values.authz.tenantNamespacePattern }}/sa/{{ .Values.authz.agentManagerServiceAccountName }}"]
---
{{- end }}

{{- if and .Values.authz.enabled .Values.authz.tenantNamespaces }}
# Allow agent-manager from specific tenant namespaces (explicit list) to call services in always-open
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-agent-manager-from-listed-tenants
  namespace: always-open
spec:
  action: ALLOW
  rules:
{{- $sa := .Values.authz.agentManagerServiceAccountName }}
{{- range $ns := .Values.authz.tenantNamespaces }}
  - from:
    - source:
        namespaces: ["{{ $ns }}"]
        principals: ["cluster.local/ns/{{ $ns }}/sa/{{ $sa }}"]
{{- end }}
---
{{- end }}
{{- end }}


