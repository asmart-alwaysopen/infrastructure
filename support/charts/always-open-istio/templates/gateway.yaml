apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.namespaces.istio }}
spec:
  selector:
{{ toYaml .Values.gateway.selector | indent 4 }}
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - {{ .Values.hosts.api | quote }}
        - {{ .Values.hosts.app | quote }}
{{- if .Values.gateway.tls.enabled }}
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: {{ .Values.gateway.tls.credentialName }}
      hosts:
        - {{ .Values.hosts.api | quote }}
        - {{ .Values.hosts.app | quote }}
{{- end }}
