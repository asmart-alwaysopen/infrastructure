# Official MongoDB Community Server image (not a bundled subchart).
# https://hub.docker.com/r/mongodb/mongodb-community-server
image:
  registry: docker.io
  repository: mongodb/mongodb-community-server
  tag: 7.0-ubi9
  pullPolicy: IfNotPresent

replicaCount: 1

# Stable Service / StatefulSet name (keep DNS name mongodb:27017).
fullnameOverride: mongodb

nameOverride: ""

auth:
  rootUsername: root
  rootPassword: "DKiNy4dUqP%"
  appUsername: appuser
  appPassword: "apppassword"
  appDatabase: always_open_db

persistence:
  enabled: true
  size: 10Gi
  storageClass: gp2

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

service:
  type: ClusterIP
  port: 27017

# Official image runs as non-root (mongodb user / typically 999:999). Persistent volumes
# from the cloud provider are often root-owned; fsGroup lets kubelet grant write access.
# If you reused an older PVC (e.g. different image UID), enable volumePermissions once to chown data.
podSecurityContext:
  fsGroup: 999
  fsGroupChangePolicy: OnRootMismatch

containerSecurityContext:
  allowPrivilegeEscalation: false

volumePermissions:
  enabled: false
  image: busybox:1.36
  uid: 999
  gid: 999
