mongodb:
  architecture: standalone
  auth:
    enabled: true
    rootUser: root
    rootPassword: "DKiNy4dUqP%"
    usernames:
      - appuser
    passwords:
      - apppassword
    databases:
      - always_open_db
  persistence:
    enabled: true
    size: 10Gi
    # Must match an existing StorageClass on the cluster (e.g. EKS default gp2).
    storageClass: gp2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
